<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>COSMO RANGER</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%23000' width='100' height='100'/%3E%3Cpath fill='%23fff' d='M50 10 L60 35 L85 35 L65 50 L75 75 L50 60 L25 75 L35 50 L15 35 L40 35 Z'/%3E%3Ccircle fill='%23fff' cx='50' cy='50' r='8'/%3E%3C/svg%3E">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }
        
        #gameCanvas {
            display: block;
            background: #000;
            image-rendering: pixelated;
        }
        
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #000;
            pointer-events: auto;
        }
        
        .hidden {
            display: none !important;
        }
        
        h1 {
            font-size: 42px;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 8px;
            margin-bottom: 40px;
            text-shadow: 0 0 30px #fff, 0 0 60px rgba(255,255,255,0.5);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.02); opacity: 0.9; }
        }
        
        .btn {
            background: transparent;
            color: #fff;
            border: 2px solid #fff;
            padding: 20px 60px;
            font-size: 18px;
            font-family: inherit;
            text-transform: uppercase;
            cursor: pointer;
            margin: 15px;
            pointer-events: auto;
            letter-spacing: 4px;
            transition: all 0.2s;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }
        
        .btn:hover, .btn:active {
            background: #fff;
            color: #000;
            box-shadow: 0 0 40px rgba(255,255,255,0.8);
            transform: scale(1.05);
        }
        
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 16px;
            color: #fff;
            font-weight: bold;
            text-shadow: 0 0 15px #fff;
            letter-spacing: 3px;
        }
        
        #controls {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            pointer-events: auto;
        }
        
        /* ANALOG JOYSTICK */
        .joystick-area {
            width: 140px;
            height: 140px;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            position: relative;
            touch-action: none;
        }
        
        .joystick-base {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 50%;
        }
        
        .joystick-knob {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.9);
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
            transition: none;
        }
        
        .joystick-knob.active {
            background: #fff;
            box-shadow: 0 0 30px rgba(255,255,255,0.9);
        }
        
        /* ATEŞ BUTONU */
        .fire-area {
            width: 120px;
            height: 120px;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            touch-action: none;
        }
        
        .fire-area:active {
            background: rgba(255,255,255,0.2);
            border-color: #fff;
            box-shadow: 0 0 40px rgba(255,255,255,0.6);
        }
        
        .fire-inner {
            width: 70px;
            height: 70px;
            background: rgba(255,255,255,0.8);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 20px rgba(255,255,255,0.4);
        }
        
        .fire-area:active .fire-inner {
            background: #fff;
            transform: scale(0.9);
            box-shadow: 0 0 40px rgba(255,255,255,0.9);
        }
        
        .fire-icon {
            width: 30px;
            height: 30px;
            position: relative;
        }
        
        .fire-icon::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            background: #000;
            border-radius: 50%;
        }
        
        .fire-icon::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-30%, -50%);
            width: 0;
            height: 0;
            border-top: 8px solid transparent;
            border-bottom: 8px solid transparent;
            border-left: 15px solid #000;
        }
        
        #bossWarning {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 28px;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 6px;
            animation: blink 0.4s infinite;
            display: none;
            text-shadow: 0 0 30px #fff;
        }
        
        @keyframes blink {
            0%, 50% { opacity: 1; text-shadow: 0 0 30px #fff; }
            51%, 100% { opacity: 0.2; text-shadow: 0 0 5px #fff; }
        }
        
        .scanline {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                transparent 50%,
                rgba(255,255,255,0.03) 50%
            );
            background-size: 100% 4px;
            pointer-events: none;
        }
        
        .vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 0%, rgba(0,0,0,0.4) 100%);
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div class="scanline"></div>
    <div class="vignette"></div>
    
    <div id="ui">
        <!-- Ana Menü -->
        <div id="menuScreen" class="screen">
            <h1>◆ COSMO RANGER ◆</h1>
            <button class="btn" onclick="game.start()">BAŞLA</button>
        </div>
        
        <!-- Oyun Bitti -->
        <div id="gameOverScreen" class="screen hidden">
            <h1>MISSION FAILED</h1>
            <div style="color: #fff; font-size: 18px; letter-spacing: 3px; margin-bottom: 30px;">
                SKOR: <span id="finalScore">0</span> | SEVİYE: <span id="finalLevel">1</span>
            </div>
            <button class="btn" onclick="game.restart()">TEKRAR DENE</button>
            <button class="btn" onclick="game.showMenu()">MENÜ</button>
        </div>
        
        <!-- HUD -->
        <div id="hud" class="hidden">
            <span>SKOR: <span id="score">0</span></span>
            <span>♥ <span id="lives">3</span></span>
            <span>LVL: <span id="level">1</span></span>
        </div>
        
        <div id="bossWarning">⚠ BOSS ALERT ⚠</div>
        
        <!-- Kontroller -->
        <div id="controls" class="hidden">
            <div class="joystick-area" id="joystick">
                <div class="joystick-base"></div>
                <div class="joystick-knob" id="joystickKnob"></div>
            </div>
            <div class="fire-area" id="fireBtn">
                <div class="fire-inner">
                    <div class="fire-icon"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let game = {
            state: 'menu',
            score: 0,
            lives: 3,
            level: 1,
            width: 0,
            height: 0,
            
            player: {
                x: 100,
                y: 0,
                vx: 0,
                vy: 0,
                width: 24,
                height: 16,
                speed: 8,
                maxSpeed: 12,
                friction: 0.85,
                bullets: [],
                shootTimer: 0,
                powerLevel: 1,
                invulnerable: 0,
                tilt: 0
            },
            
            enemies: [],
            enemyBullets: [],
            particles: [],
            powerups: [],
            stars: [],
            shockwaves: [],
            
            levelProgress: 0,
            levelLength: 2500,
            bossActive: false,
            boss: null,
            enemySpawnTimer: 0,
            
            joystick: {
                active: false,
                x: 0,
                y: 0,
                dx: 0,
                dy: 0,
                maxRadius: 45
            },
            fireActive: false
        };
        
        function resize() {
            game.width = window.innerWidth;
            game.height = window.innerHeight;
            canvas.width = game.width;
            canvas.height = game.height;
            game.player.y = game.height / 2;
        }
        window.addEventListener('resize', resize);
        resize();
        
        function initStars() {
            game.stars = [];
            for (let i = 0; i < 100; i++) {
                game.stars.push({
                    x: Math.random() * game.width,
                    y: Math.random() * game.height,
                    speed: 0.5 + Math.random() * 3,
                    size: Math.random() > 0.9 ? 4 : (Math.random() > 0.6 ? 3 : 2),
                    brightness: Math.random(),
                    twinkle: Math.random() * Math.PI * 2
                });
            }
        }
        
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(type) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            switch(type) {
                case 'shoot':
                    osc.frequency.value = 1500;
                    osc.type = 'square';
                    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.06);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.06);
                    break;
                case 'explosion':
                    osc.frequency.value = 100;
                    osc.type = 'sawtooth';
                    gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.5);
                    break;
                case 'powerup':
                    osc.frequency.value = 1000;
                    osc.type = 'sine';
                    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                    osc.frequency.linearRampToValueAtTime(2000, audioCtx.currentTime + 0.2);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.2);
                    break;
                case 'hit':
                    osc.frequency.value = 400;
                    osc.type = 'square';
                    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.1);
                    break;
            }
        }
        
        function drawRect(x, y, w, h, color = '#fff') {
            ctx.fillStyle = color;
            ctx.fillRect(Math.floor(x), Math.floor(y), w, h);
        }
        
        // GELİŞMİŞ OYUNCU GEMİSİ - HIZLI TEPKİLİ
        function drawPlayer() {
            const p = game.player;
            const x = Math.floor(p.x);
            const y = Math.floor(p.y);
            
            if (p.invulnerable > 0 && Math.floor(Date.now() / 30) % 2 === 0) return;
            
            // Eğim (tilt) hesaplama
            const tilt = Math.max(-15, Math.min(15, p.vy * 2));
            const tiltRad = tilt * Math.PI / 180;
            
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(tiltRad);
            
            // Ana gövde
            drawRect(-10, -8, 28, 16, '#fff');
            drawRect(-8, -6, 24, 12, '#000');
            drawRect(-6, -4, 20, 8, '#fff');
            
            // Burun
            drawRect(12, -6, 10, 12, '#fff');
            drawRect(14, -4, 6, 8, '#000');
            drawRect(16, -2, 4, 4, '#fff');
            
            // Kanatlar (eğime göre hareketli)
            const wingOffset = Math.abs(tilt) * 0.3;
            drawRect(-6, -14 - wingOffset, 16, 6, '#fff');
            drawRect(-4, -16 - wingOffset, 12, 2, '#fff');
            drawRect(-2, -12 - wingOffset, 8, 2, '#000');
            
            drawRect(-6, 8 + wingOffset, 16, 6, '#fff');
            drawRect(-4, 14 + wingOffset, 12, 2, '#fff');
            drawRect(-2, 10 + wingOffset, 8, 2, '#000');
            
            // Motorlar
            drawRect(-14, -6, 6, 4, '#fff');
            drawRect(-14, 2, 6, 4, '#fff');
            
            // Alev efekti (hıza göre)
            const flameLength = 8 + Math.abs(p.vx) * 0.5 + Math.random() * 6;
            drawRect(-16 - flameLength, -5, flameLength, 2, '#fff');
            drawRect(-16 - flameLength, 3, flameLength, 2, '#fff');
            drawRect(-14 - flameLength * 0.7, -4, flameLength * 0.5, 1, '#aaa');
            drawRect(-14 - flameLength * 0.7, 4, flameLength * 0.5, 1, '#aaa');
            
            // Silahlar
            if (p.powerLevel >= 2) {
                drawRect(0, -18, 6, 4, '#fff');
                drawRect(0, 14, 6, 4, '#fff');
            }
            if (p.powerLevel >= 3) {
                drawRect(-4, -22, 4, 4, '#fff');
                drawRect(-4, 18, 4, 4, '#fff');
            }
            
            ctx.restore();
        }
        
        // DETAYLI DÜŞMANLAR
        function drawEnemy(enemy) {
            const x = Math.floor(enemy.x);
            const y = Math.floor(enemy.y);
            
            switch(enemy.type) {
                case 1:
                    drawRect(x - 10, y - 5, 20, 10, '#fff');
                    drawRect(x - 8, y - 7, 16, 2, '#fff');
                    drawRect(x - 8, y + 5, 16, 2, '#fff');
                    drawRect(x - 6, y - 3, 12, 6, '#000');
                    drawRect(x + 2, y - 2, 6, 4, '#000');
                    drawRect(x - 12, y - 2, 2, 4, '#fff');
                    break;
                    
                case 2:
                    drawRect(x - 12, y - 3, 24, 6, '#fff');
                    drawRect(x - 8, y - 10, 8, 4, '#fff');
                    drawRect(x - 8, y + 6, 8, 4, '#fff');
                    drawRect(x - 10, y - 8, 4, 2, '#fff');
                    drawRect(x - 10, y + 6, 4, 2, '#fff');
                    drawRect(x + 2, y - 2, 6, 4, '#000');
                    drawRect(x - 14, y - 2, 2, 1, '#fff');
                    drawRect(x - 14, y + 1, 2, 1, '#fff');
                    break;
                    
                case 3:
                    drawRect(x - 15, y - 12, 30, 24, '#fff');
                    drawRect(x - 13, y - 10, 26, 20, '#000');
                    drawRect(x - 5, y - 16, 10, 4, '#fff');
                    drawRect(x - 5, y + 12, 10, 4, '#fff');
                    drawRect(x - 3, y - 14, 6, 2, '#000');
                    drawRect(x - 3, y + 12, 6, 2, '#000');
                    drawRect(x - 20, y - 6, 5, 4, '#fff');
                    drawRect(x - 20, y + 2, 5, 4, '#fff');
                    drawRect(x + 12, y - 6, 6, 4, '#fff');
                    drawRect(x + 12, y + 2, 6, 4, '#fff');
                    drawRect(x - 10, y + 14, 4, 4, '#fff');
                    drawRect(x + 6, y + 14, 4, 4, '#fff');
                    break;
                    
                case 4:
                    drawRect(x - 12, y - 3, 24, 6, '#fff');
                    drawRect(x - 10, y - 12, 12, 6, '#fff');
                    drawRect(x - 10, y + 6, 12, 6, '#fff');
                    drawRect(x - 8, y - 14, 8, 2, '#fff');
                    drawRect(x - 8, y + 12, 8, 2, '#fff');
                    drawRect(x - 6, y - 10, 4, 2, '#000');
                    drawRect(x - 6, y + 8, 4, 2, '#000');
                    drawRect(x + 2, y - 6, 8, 4, '#000');
                    drawRect(x + 2, y + 2, 8, 4, '#000');
                    drawRect(x - 16, y - 2, 4, 4, '#fff');
                    break;
                    
                case 5:
                    for (let i = 0; i < 10; i++) {
                        const w = 20 - i * 2;
                        drawRect(x - 10 + i, y - w/2, 2, w, '#fff');
                    }
                    drawRect(x - 6, y - 2, 8, 1, '#000');
                    drawRect(x - 4, y, 4, 1, '#000');
                    break;
            }
        }
        
        function drawBoss() {
            if (!game.boss) return;
            const b = game.boss;
            const x = Math.floor(b.x);
            const y = Math.floor(b.y);
            const pulse = Math.sin(Date.now() / 300) * 3;
            
            // Ana gövde
            drawRect(x - 50, y - 40, 100, 80, '#fff');
            drawRect(x - 46, y - 36, 92, 72, '#000');
            
            // Üst kule
            drawRect(x - 25, y - 60, 50, 20, '#fff');
            drawRect(x - 21, y - 56, 42, 14, '#000');
            drawRect(x - 12, y - 65, 24, 8, '#fff');
            
            // Alt kule
            drawRect(x - 25, y + 40, 50, 20, '#fff');
            drawRect(x - 21, y + 42, 42, 14, '#000');
            drawRect(x - 12, y + 57, 24, 8, '#fff');
            
            // Yan kuleler
            drawRect(x - 70, y - 25, 20, 50, '#fff');
            drawRect(x - 66, y - 21, 14, 42, '#000');
            drawRect(x - 78, y - 12, 8, 24, '#fff');
            
            drawRect(x + 50, y - 25, 20, 50, '#fff');
            drawRect(x + 52, y - 21, 14, 42, '#000');
            drawRect(x + 70, y - 12, 8, 24, '#fff');
            
            // Çekirdek (pulsating)
            drawRect(x - 15 + pulse, y - 15 + pulse, 30 - pulse*2, 30 - pulse*2, '#fff');
            drawRect(x - 10, y - 10, 20, 20, '#000');
            drawRect(x - 6, y - 6, 12, 12, '#fff');
            drawRect(x - 3, y - 3, 6, 6, '#000');
            
            // Motorlar
            const flame = (Math.floor(Date.now() / 40) % 5) * 2;
            for (let i = 0; i < 3; i++) {
                const my = y - 20 + i * 20;
                drawRect(x + 60 + flame, my - 4, 8 + flame, 8, '#fff');
            }
            
            // Can barı
            const barWidth = 120;
            const healthPercent = b.health / b.maxHealth;
            drawRect(x - 60, y - 75, barWidth, 10, '#000');
            drawRect(x - 58, y - 73, 116 * healthPercent, 6, '#fff');
        }
        
        function drawPowerup(p) {
            const x = Math.floor(p.x);
            const y = Math.floor(p.y);
            const bounce = Math.sin(Date.now() / 100) * 4;
            const rotate = Date.now() / 200;
            
            // Dönen halka
            for (let i = 0; i < 12; i++) {
                const angle = rotate + i * Math.PI / 6;
                const r = 12;
                const px = x + Math.cos(angle) * r;
                const py = y + bounce + Math.sin(angle) * r;
                drawRect(px - 2, py - 2, 4, 4, '#fff');
            }
            
            // İç kutu
            drawRect(x - 10, y - 10 + bounce, 20, 20, '#fff');
            drawRect(x - 8, y - 8 + bounce, 16, 16, '#000');
            
            if (p.type === 'health') {
                drawRect(x - 3, y - 5 + bounce, 6, 4, '#fff');
                drawRect(x - 5, y - 3 + bounce, 2, 3, '#fff');
                drawRect(x + 3, y - 3 + bounce, 2, 3, '#fff');
                drawRect(x - 3, y + 1 + bounce, 6, 3, '#fff');
            } else if (p.type === 'weapon') {
                drawRect(x - 5, y - 5 + bounce, 2, 8, '#fff');
                drawRect(x + 3, y - 5 + bounce, 2, 8, '#fff');
                drawRect(x - 1, y - 2 + bounce, 2, 5, '#fff');
            } else if (p.type === 'shield') {
                drawRect(x - 5, y - 5 + bounce, 10, 10, '#fff');
                drawRect(x - 3, y - 3 + bounce, 6, 6, '#000');
            }
        }
        
        // ZENGİNLEŞTİRİLMİŞ PATLAMA EFEKTİ
        function createExplosion(x, y, size) {
            // Parçacıklar
            for (let i = 0; i < size * 3; i++) {
                const angle = (Math.PI * 2 * i) / (size * 3) + Math.random() * 0.5;
                const speed = 3 + Math.random() * 8;
                game.particles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 40 + Math.random() * 30,
                    size: 3 + Math.random() * 5,
                    type: Math.random() > 0.3 ? 'square' : 'pixel',
                    decay: 0.96 + Math.random() * 0.02
                });
            }
            
            // Shockwave
            game.shockwaves.push({
                x: x,
                y: y,
                radius: 5,
                maxRadius: 60 + size * 2,
                life: 30,
                width: 3
            });
            
            playSound('explosion');
        }
        
        // JOYSTICK KONTROLÜ
        const joystick = document.getElementById('joystick');
        const joystickKnob = document.getElementById('joystickKnob');
        const fireBtn = document.getElementById('fireBtn');
        
        function updateJoystick(e) {
            const rect = joystick.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            let dx = e.clientX - centerX;
            let dy = e.clientY - centerY;
            
            const distance = Math.sqrt(dx * dx + dy * dy);
            const maxDist = game.joystick.maxRadius;
            
            if (distance > maxDist) {
                dx = (dx / distance) * maxDist;
                dy = (dy / distance) * maxDist;
            }
            
            game.joystick.dx = dx / maxDist;
            game.joystick.dy = dy / maxDist;
            
            joystickKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
            joystickKnob.classList.add('active');
        }
        
        joystick.addEventListener('touchstart', (e) => {
            e.preventDefault();
            game.joystick.active = true;
            updateJoystick(e.touches[0]);
        });
        
        joystick.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (game.joystick.active) {
                updateJoystick(e.touches[0]);
            }
        });
        
        joystick.addEventListener('touchend', (e) => {
            e.preventDefault();
            game.joystick.active = false;
            game.joystick.dx = 0;
            game.joystick.dy = 0;
            joystickKnob.style.transform = 'translate(-50%, -50%)';
            joystickKnob.classList.remove('active');
        });
        
        // Mouse desteği
        joystick.addEventListener('mousedown', (e) => {
            game.joystick.active = true;
            updateJoystick(e);
        });
        
        window.addEventListener('mousemove', (e) => {
            if (game.joystick.active) {
                updateJoystick(e);
            }
        });
        
        window.addEventListener('mouseup', () => {
            if (game.joystick.active) {
                game.joystick.active = false;
                game.joystick.dx = 0;
                game.joystick.dy = 0;
                joystickKnob.style.transform = 'translate(-50%, -50%)';
                joystickKnob.classList.remove('active');
            }
        });
        
        // Ateş butonu
        fireBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            game.fireActive = true;
        });
        
        fireBtn.addEventListener('touchend', (e) => {
            e.preventDefault();
            game.fireActive = false;
        });
        
        fireBtn.addEventListener('mousedown', () => game.fireActive = true);
        fireBtn.addEventListener('mouseup', () => game.fireActive = false);
        
        // OYUN FONKSİYONLARI
        game.start = function() {
            document.getElementById('menuScreen').classList.add('hidden');
            document.getElementById('hud').classList.remove('hidden');
            document.getElementById('controls').classList.remove('hidden');
            
            this.state = 'playing';
            this.score = 0;
            this.lives = 3;
            this.level = 1;
            this.resetLevel();
            initStars();
            this.updateHUD();
            this.loop();
        };
        
        game.resetLevel = function() {
            this.player.x = 100;
            this.player.y = this.height / 2;
            this.player.vx = 0;
            this.player.vy = 0;
            this.player.bullets = [];
            this.player.powerLevel = 1;
            this.player.invulnerable = 0;
            this.enemies = [];
            this.enemyBullets = [];
            this.particles = [];
            this.powerups = [];
            this.shockwaves = [];
            this.levelProgress = 0;
            this.bossActive = false;
            this.boss = null;
            this.enemySpawnTimer = 0;
            document.getElementById('bossWarning').style.display = 'none';
        };
        
        game.showMenu = function() {
            document.getElementById('gameOverScreen').classList.add('hidden');
            document.getElementById('hud').classList.add('hidden');
            document.getElementById('controls').classList.add('hidden');
            document.getElementById('menuScreen').classList.remove('hidden');
            this.state = 'menu';
        };
        
        game.restart = function() {
            document.getElementById('gameOverScreen').classList.add('hidden');
            this.start();
        };
        
        game.gameOver = function() {
            this.state = 'gameover';
            document.getElementById('finalScore').textContent = this.score;
            document.getElementById('finalLevel').textContent = this.level;
            document.getElementById('gameOverScreen').classList.remove('hidden');
            document.getElementById('controls').classList.add('hidden');
        };
        
        game.updateHUD = function() {
            document.getElementById('score').textContent = this.score;
            document.getElementById('lives').textContent = '♥'.repeat(this.lives);
            document.getElementById('level').textContent = this.level;
        };
        
        // ANA OYUN DÖNGÜSÜ
        game.loop = function() {
            if (this.state !== 'playing') return;
            
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, this.width, this.height);
            
            // Yıldızlar (parlaklık animasyonu)
            this.stars.forEach(star => {
                star.x -= star.speed;
                if (star.x < 0) {
                    star.x = this.width;
                    star.y = Math.random() * this.height;
                }
                star.twinkle += 0.05;
                const alpha = 0.3 + star.brightness * 0.7 + Math.sin(star.twinkle) * 0.2;
                ctx.fillStyle = `rgba(255,255,255,${Math.max(0.1, alpha)})`;
                ctx.fillRect(star.x, star.y, star.size, star.size);
            });
            
            // JOYSTICK HAREKETİ - HIZLI TEPKİ
            const p = this.player;
            if (this.joystick.active) {
                p.vx += this.joystick.dx * 2;
                p.vy += this.joystick.dy * 2;
            }
            
            // Sürükleme (friction)
            p.vx *= p.friction;
            p.vy *= p.friction;
            
            // Hız limiti
            const speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
            if (speed > p.maxSpeed) {
                p.vx = (p.vx / speed) * p.maxSpeed;
                p.vy = (p.vy / speed) * p.maxSpeed;
            }
            
            // Pozisyon güncelleme
            p.x += p.vx;
            p.y += p.vy;
            
            // Sınır kontrolü
            p.x = Math.max(30, Math.min(this.width - 50, p.x));
            p.y = Math.max(30, Math.min(this.height - 30, p.y));
            
            // Ateş
            if (this.fireActive && p.shootTimer <= 0) {
                p.bullets.push({x: p.x + 20, y: p.y, speed: 12, damage: 1});
                if (p.powerLevel >= 2) {
                    p.bullets.push({x: p.x + 15, y: p.y - 10, speed: 11, damage: 1});
                    p.bullets.push({x: p.x + 15, y: p.y + 10, speed: 11, damage: 1});
                }
                if (p.powerLevel >= 3) {
                    p.bullets.push({x: p.x + 10, y: p.y - 15, speed: 10, damage: 1});
                    p.bullets.push({x: p.x + 10, y: p.y + 15, speed: 10, damage: 1});
                }
                p.shootTimer = 5;
                playSound('shoot');
            }
            if (p.shootTimer > 0) p.shootTimer--;
            if (p.invulnerable > 0) p.invulnerable--;
            
            // Mermiler (parlak)
            p.bullets = p.bullets.filter(b => {
                b.x += b.speed;
                // Glow efekti
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#fff';
                drawRect(b.x, b.y - 1, 12, 3, '#fff');
                drawRect(b.x + 2, b.y - 2, 8, 5, '#fff');
                ctx.shadowBlur = 0;
                return b.x < this.width;
            });
            
            // Seviye ilerlemesi
            if (!this.bossActive) {
                this.levelProgress += 0.3;
                
                if (this.levelProgress > this.levelLength - 300) {
                    document.getElementById('bossWarning').style.display = 'block';
                } else {
                    document.getElementById('bossWarning').style.display = 'none';
                }
                
                if (this.levelProgress >= this.levelLength) {
                    this.spawnBoss();
                }
                
                this.enemySpawnTimer--;
                if (this.enemySpawnTimer <= 0) {
                    this.spawnEnemy();
                    this.enemySpawnTimer = Math.max(12, 45 - this.level * 3);
                }
            }
            
            // Boss
            if (this.bossActive && this.boss) {
                this.updateBoss();
            }
            
            // Düşmanlar
            this.enemies = this.enemies.filter(e => {
                e.x -= e.speed;
                e.y += Math.sin(e.x * 0.01 + e.offset) * e.waveAmp;
                
                if (e.canShoot && Math.random() < 0.012) {
                    this.enemyBullets.push({
                        x: e.x - 8,
                        y: e.y,
                        vx: -7,
                        vy: (this.player.y - e.y) * 0.02
                    });
                }
                
                drawEnemy(e);
                
                let hit = false;
                p.bullets = p.bullets.filter(b => {
                    if (Math.abs(b.x - e.x) < e.width && Math.abs(b.y - e.y) < e.height) {
                        e.health -= b.damage;
                        if (e.health <= 0) {
                            hit = true;
                            this.score += e.points;
                            createExplosion(e.x, e.y, 12);
                            
                            if (Math.random() < 0.25) {
                                const types = ['health', 'weapon', 'shield'];
                                this.powerups.push({
                                    x: e.x,
                                    y: e.y,
                                    type: types[Math.floor(Math.random() * types.length)],
                                    speed: 1.5
                                });
                            }
                        }
                        return false;
                    }
                    return true;
                });
                
                if (p.invulnerable <= 0 &&
                    Math.abs(p.x - e.x) < 22 && 
                    Math.abs(p.y - e.y) < 18) {
                    hit = true;
                    this.playerHit();
                }
                
                return !hit && e.x > -60;
            });
            
            // Düşman mermileri
            this.enemyBullets = this.enemyBullets.filter(b => {
                b.x += b.vx;
                b.y += b.vy;
                drawRect(b.x, b.y - 2, 8, 5, '#fff');
                drawRect(b.x + 2, b.y - 1, 2, 3, '#000');
                
                if (p.invulnerable <= 0 &&
                    Math.abs(b.x - p.x) < 18 && 
                    Math.abs(b.y - p.y) < 14) {
                    this.playerHit();
                    return false;
                }
                
                return b.x > -10;
            });
            
            // Güçlendirmeler
            this.powerups = this.powerups.filter(pu => {
                pu.x -= pu.speed;
                drawPowerup(pu);
                
                if (Math.abs(pu.x - p.x) < 25 && 
                    Math.abs(pu.y - p.y) < 25) {
                    
                    if (pu.type === 'health') {
                        this.lives = Math.min(5, this.lives + 1);
                        playSound('powerup');
                    } else if (pu.type === 'weapon') {
                        p.powerLevel = Math.min(3, p.powerLevel + 1);
                        playSound('powerup');
                    } else if (pu.type === 'shield') {
                        p.invulnerable = 180;
                        playSound('powerup');
                    }
                    this.updateHUD();
                    return false;
                }
                
                return pu.x > -30;
            });
            
            // Shockwave'ler
            this.shockwaves = this.shockwaves.filter(s => {
                s.radius += 4;
                s.life--;
                s.width *= 0.95;
                
                ctx.strokeStyle = `rgba(255,255,255,${s.life / 30})`;
                ctx.lineWidth = Math.max(1, s.width);
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
                ctx.stroke();
                
                return s.life > 0 && s.radius < s.maxRadius;
            });
            
            // Parçacıklar (animasyonlu)
            this.particles = this.particles.filter(pt => {
                pt.x += pt.vx;
                pt.y += pt.vy;
                pt.vx *= pt.decay;
                pt.vy *= pt.decay;
                pt.life--;
                pt.size *= 0.97;
                
                const alpha = pt.life / 50;
                ctx.fillStyle = `rgba(255,255,255,${alpha})`;
                
                if (pt.type === 'square') {
                    ctx.fillRect(pt.x - pt.size/2, pt.y - pt.size/2, pt.size, pt.size);
                } else {
                    ctx.fillRect(pt.x, pt.y, pt.size, pt.size);
                }
                
                return pt.life > 0 && pt.size > 0.5;
            });
            
            // Oyuncu
            drawPlayer();
            
            requestAnimationFrame(() => this.loop());
        };
        
        game.spawnEnemy = function() {
            const types = [
                {type: 1, width: 20, height: 14, health: 1, speed: 3.5, points: 100, canShoot: false, waveAmp: 2, offset: 0},
                {type: 2, width: 24, height: 16, health: 1, speed: 6, points: 200, canShoot: false, waveAmp: 1, offset: 0},
                {type: 3, width: 30, height: 28, health: 6, speed: 2, points: 500, canShoot: true, waveAmp: 0.5, offset: Math.PI},
                {type: 4, width: 24, height: 22, health: 4, speed: 3, points: 400, canShoot: true, waveAmp: 1.5, offset: 0},
                {type: 5, width: 20, height: 18, health: 2, speed: 5, points: 300, canShoot: false, waveAmp: 4, offset: Math.PI/2}
            ];
            
            const availableTypes = Math.min(types.length, 2 + Math.floor(this.level / 2));
            const enemyType = types[Math.floor(Math.random() * availableTypes)];
            
            this.enemies.push({
                x: this.width + 40,
                y: 60 + Math.random() * (this.height - 120),
                ...enemyType
            });
        };
        
        game.spawnBoss = function() {
            this.bossActive = true;
            this.boss = {
                x: this.width + 100,
                y: this.height / 2,
                targetY: this.height / 2,
                width: 100,
                height: 80,
                health: 40 + this.level * 20,
                maxHealth: 40 + this.level * 20,
                shootTimer: 0
            };
        };
        
        game.updateBoss = function() {
            const b = this.boss;
            
            b.x = Math.max(this.width / 2, b.x - 0.4);
            b.y += (b.targetY - b.y) * 0.02;
            
            if (Math.random() < 0.03) {
                b.targetY = 100 + Math.random() * (this.height - 200);
            }
            
            b.shootTimer--;
            if (b.shootTimer <= 0 && b.x < this.width - 200) {
                const patterns = [
                    () => {
                        this.enemyBullets.push({x: b.x - 50, y: b.y, vx: -8, vy: 0});
                        this.enemyBullets.push({x: b.x - 50, y: b.y - 20, vx: -7, vy: -3});
                        this.enemyBullets.push({x: b.x - 50, y: b.y + 20, vx: -7, vy: 3});
                    },
                    () => {
                        for (let i = 0; i < 8; i++) {
                            const angle = (Math.PI * i) / 4;
                            this.enemyBullets.push({
                                x: b.x,
                                y: b.y,
                                vx: Math.cos(angle) * 6,
                                vy: Math.sin(angle) * 6
                            });
                        }
                    },
                    () => {
                        const dx = this.player.x - b.x;
                        const dy = this.player.y - b.y;
                        const dist = Math.sqrt(dx*dx + dy*dy);
                        for (let i = 0; i < 3; i++) {
                            this.enemyBullets.push({
                                x: b.x - 50,
                                y: b.y + (i-1)*15,
                                vx: (dx/dist) * 7,
                                vy: (dy/dist) * 7 + (i-1)*2
                            });
                        }
                    }
                ];
                
                patterns[Math.floor(Math.random() * patterns.length)]();
                b.shootTimer = Math.max(25, 50 - this.level * 2);
            }
            
            this.player.bullets = this.player.bullets.filter(bullet => {
                if (Math.abs(bullet.x - b.x) < 45 && 
                    Math.abs(bullet.y - b.y) < 40) {
                    b.health--;
                    if (Math.abs(bullet.x - b.x) < 15 && Math.abs(bullet.y - b.y) < 15) {
                        b.health -= 2;
                    }
                    if (b.health <= 0) {
                        this.bossDefeated();
                    }
                    return false;
                }
                return true;
            });
            
            if (this.player.invulnerable <= 0 &&
                Math.abs(this.player.x - b.x) < 60 && 
                Math.abs(this.player.y - b.y) < 50) {
                this.playerHit();
            }
            
            drawBoss();
        };
        
        game.bossDefeated = function() {
            createExplosion(this.boss.x, this.boss.y, 80);
            this.bossActive = false;
            this.boss = null;
            this.score += 3000 * this.level;
            document.getElementById('bossWarning').style.display = 'none';
            
            setTimeout(() => {
                this.level++;
                this.resetLevel();
                this.updateHUD();
            }, 3000);
        };
        
        game.playerHit = function() {
            this.lives--;
            createExplosion(this.player.x, this.player.y, 30);
            playSound('hit');
            this.updateHUD();
            
            this.player.x = 100;
            this.player.y = this.height / 2;
            this.player.vx = 0;
            this.player.vy = 0;
            this.player.invulnerable = 150;
            this.player.powerLevel = Math.max(1, this.player.powerLevel - 1);
            
            if (this.lives <= 0) {
                this.gameOver();
            }
        };
        
        initStars();
    </script>
